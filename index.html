<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Green Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a2a1a;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .game-wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #2a3a2a;
  }
  .canvas-wrap {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  canvas {
    display: block;
    background: #8ab88a;
    border-radius: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    color: #d4e8d4;
    font-size: 16px;
    background: #1a2a1a;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }
  .hud span {
    background: #2a3a2a;
    padding: 6px 14px;
    border-radius: 8px;
  }
  #restartBtn {
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---- nipple.js zones (fixed) ---- */
  #joystickZone {
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 140px;
    height: 140px;
    z-index: 20;
    touch-action: none;
  }
  #jumpZone {
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 110px;
    height: 110px;
    z-index: 20;
    touch-action: none;
  }
  .jump-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #d4e8d4;
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    letter-spacing: 0.5px;
  }
  .controls-hint {
    display: none;
  }
  @media (min-width: 768px) {
    #joystickZone, #jumpZone { display: none; }
    .controls-hint {
      display: block;
      color: #6a9a6a;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      flex-shrink: 0;
    }
    .hud { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="hud">
    <span>🍀 <span id="coinCount">0</span></span>
    <span id="message" style="font-weight:600;">&#9654; игра</span>
    <span id="restartBtn">↻ заново</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="controls-hint">← → двигаться &nbsp;·&nbsp; Пробел / W прыжок</div>
</div>

<!-- nipple.js zones (fixed) -->
<div id="joystickZone"></div>
<div id="jumpZone"><div class="jump-label">прыжок</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const coinSpan = document.getElementById('coinCount');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

// ---------- world dimensions (taller viewport) ----------
const WORLD_W = 800;
const WORLD_H = 700;

const GRAVITY = 0.55;
const PLAYER_SPEED = 3.2;
const JUMP_FORCE = -10;

// ---------- green palette ----------
const COLORS = {
  sky1:        '#a8d4a8',
  sky2:        '#8ab88a',
  hill1:       '#7aaa7a',
  hill2:       '#6a9a6a',
  hill3:       '#5a8a5a',
  platform:    '#5a8a5a',
  platformTop: '#7aaa7a',
  player:      '#3a6a3a',
  playerDark:  '#2a5a2a',
  coin:        '#c4d88c',
  coinGlow:    '#dce8b0',
  ground:      '#4a7a4a',
  groundTop:   '#6a9a6a',
  goal:        '#88b888',
  goalGlow:    '#a8d8a8',
  text:        '#2a3a2a',
};

// ---------- level data (taller world, bigger player) ----------
const platforms = [
  // ground
  { x: 0,   y: 660, w: 800, h: 40 },
  // floating platforms
  { x: 60,  y: 520, w: 130, h: 20 },
  { x: 260, y: 400, w: 110, h: 20 },
  { x: 420, y: 480, w: 140, h: 20 },
  { x: 600, y: 340, w: 160, h: 20 },
  // stairs near end
  { x: 540, y: 560, w: 90,  h: 20 },
];

const coins = [
  { x: 110, y: 488 },
  { x: 160, y: 488 },
  { x: 300, y: 368 },
  { x: 345, y: 368 },
  { x: 470, y: 448 },
  { x: 520, y: 448 },
  { x: 660, y: 310 },
  { x: 710, y: 310 },
];

const goal = { x: 730, y: 290, w: 40, h: 46 };
const playerStart = { x: 50, y: 590 };

// ---------- game state ----------
let player, camera, coinsCollected, gameWon, keys, coinAnim;
let mobileDir = 0;
let mobileJump = false;

function resetGame() {
  player = {
    x: playerStart.x,
    y: playerStart.y,
    w: 30,
    h: 40,
    vx: 0,
    vy: 0,
    onGround: false,
    jumpPressed: false,
  };
  camera = { x: 0 };
  coinsCollected = 0;
  gameWon = false;
  coinSpan.textContent = '0';
  messageEl.innerHTML = '&#9654; игра';
  messageEl.style.color = '#d4e8d4';
  keys = {};
  coinAnim = 0;
  mobileDir = 0;
  mobileJump = false;
}

resetGame();

// ---------- canvas resize ----------
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width;
  const h = rect.height;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const scaleX = (w * dpr) / WORLD_W;
  const scaleY = (h * dpr) / WORLD_H;
  const scale = Math.min(scaleX, scaleY);
  const offsetX = ((w * dpr) - WORLD_W * scale) / 2;
  const offsetY = ((h * dpr) - WORLD_H * scale) / 2;
  ctx.scale(scale, scale);
  ctx.translate(offsetX / scale, offsetY / scale);
  canvas._scale = scale;
  canvas._ox = offsetX / scale;
  canvas._oy = offsetY / scale;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------- input: keyboard ----------
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// ---------- input: nipple.js mobile joystick ----------
function initNipple() {
  const jZone = document.getElementById('joystickZone');
  if (!jZone || jZone._nippleInited) return;
  jZone._nippleInited = true;

  const joy = nipplejs.create({
    zone: jZone,
    mode: 'static',
    position: { left: '50%', top: '50%' },
    color: '#5a8a5a',
    size: 110,
    restOpacity: 0.5,
    fadeTime: 80,
  });
  joy.on('move', (evt, data) => {
    if (!data.direction) { mobileDir = 0; return; }
    const force = data.force || 1;
    const dir = data.direction.x === 'left' ? -1 : data.direction.x === 'right' ? 1 : 0;
    mobileDir = dir * force;
  });
  joy.on('end', () => { mobileDir = 0; });

  // jump zone: tap anywhere in the right zone
  const jumpZone = document.getElementById('jumpZone');
  if (!jumpZone || jumpZone._jumpInited) return;
  jumpZone._jumpInited = true;
  const setJump = (e) => { e.preventDefault(); mobileJump = true; };
  const clearJump = (e) => { e.preventDefault(); mobileJump = false; };
  jumpZone.addEventListener('touchstart', setJump, { passive: false });
  jumpZone.addEventListener('touchend', clearJump, { passive: false });
  jumpZone.addEventListener('touchcancel', clearJump, { passive: false });
  jumpZone.addEventListener('mousedown', setJump);
  jumpZone.addEventListener('mouseup', clearJump);
  jumpZone.addEventListener('mouseleave', clearJump);
}

initNipple();

restartBtn.addEventListener('click', resetGame);
restartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetGame(); }, { passive: false });

// ---------- collisions (separate X/Y) ----------
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function collideX(entity) {
  for (const p of platforms) {
    if (!rectCollide(entity, p)) continue;
    if (entity.vx > 0) {
      entity.x = p.x - entity.w;
    } else if (entity.vx < 0) {
      entity.x = p.x + p.w;
    }
    entity.vx = 0;
  }
}

function collideY(entity) {
  entity.onGround = false;
  for (const p of platforms) {
    if (!rectCollide(entity, p)) continue;
    if (entity.vy > 0) {
      entity.y = p.y - entity.h;
      entity.vy = 0;
      entity.onGround = true;
    } else if (entity.vy < 0) {
      entity.y = p.y + p.h;
      entity.vy = 0;
    }
  }
}

// ---------- update ----------
function update() {
  if (gameWon) return;

  let dir = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dir = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dir = 1;
  if (mobileDir !== 0) dir = mobileDir;
  player.vx = dir * PLAYER_SPEED;

  const jumpKey = keys['Space'] || keys['KeyW'] || keys['ArrowUp'] || mobileJump;
  if (jumpKey && player.onGround && !player.jumpPressed) {
    player.vy = JUMP_FORCE;
    player.jumpPressed = true;
  }
  if (!jumpKey) player.jumpPressed = false;

  player.vy += GRAVITY;
  if (player.vy > 12) player.vy = 12;

  player.x += player.vx;
  collideX(player);

  player.y += player.vy;
  collideY(player);

  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > WORLD_W) { player.x = WORLD_W - player.w; player.vx = 0; }
  if (player.y > WORLD_H + 50) resetGame();

  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    const coinRect = { x: c.x, y: c.y, w: 14, h: 14 };
    if (rectCollide(player, coinRect)) {
      coins.splice(i, 1);
      coinsCollected++;
      coinSpan.textContent = coinsCollected;
    }
  }

  if (!gameWon && rectCollide(player, goal)) {
    gameWon = true;
    messageEl.innerHTML = '&#10003; уровень пройден!';
    messageEl.style.color = '#88b888';
  }

  camera.x = player.x - WORLD_W / 2 + player.w / 2;
  camera.x = Math.max(0, Math.min(camera.x, 150));

  coinAnim = (coinAnim + 0.04) % (Math.PI * 2);
}

// ---------- draw ----------
function draw() {
  ctx.save();
  ctx.translate(-camera.x, 0);

  // sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, WORLD_H);
  grad.addColorStop(0, '#b8dcb8');
  grad.addColorStop(0.5, '#8ab88a');
  grad.addColorStop(1, '#6a9a6a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // background hills
  ctx.fillStyle = '#7aaa7a';
  ctx.beginPath(); ctx.ellipse(120, 620, 180, 80, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6a9a6a';
  ctx.beginPath(); ctx.ellipse(500, 640, 240, 70, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5a8a5a';
  ctx.beginPath(); ctx.ellipse(300, 650, 200, 60, 0, 0, Math.PI * 2); ctx.fill();

  // platforms
  for (const p of platforms) {
    ctx.fillStyle = COLORS.platform;
    ctx.shadowColor = 'rgba(0,0,0,0.06)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    const r = 6, x = p.x, y = p.y, w = p.w, h = p.h;
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = COLORS.platformTop; ctx.shadowBlur = 0;
    ctx.fillRect(x + 4, y + 1, w - 8, 5);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  }

  // coins
  for (const c of coins) {
    const bob = Math.sin(coinAnim + c.x * 0.05) * 3;
    ctx.save(); ctx.translate(c.x + 7, c.y + 7 + bob);
    ctx.shadowColor = 'rgba(196,216,140,0.5)'; ctx.shadowBlur = 10;
    ctx.fillStyle = COLORS.coinGlow;
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = COLORS.coin;
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#b0c47a';
    ctx.beginPath(); ctx.arc(-1, -1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // goal
  ctx.save();
  ctx.shadowColor = 'rgba(136,184,136,0.5)'; ctx.shadowBlur = 14;
  ctx.fillStyle = COLORS.goal;
  ctx.beginPath(); ctx.roundRect(goal.x, goal.y, goal.w, goal.h, 6); ctx.fill();
  ctx.shadowBlur = 0; ctx.fillStyle = '#a0d0a0';
  ctx.beginPath(); ctx.roundRect(goal.x + 4, goal.y + 4, goal.w - 8, goal.h - 8, 4); ctx.fill();
  ctx.fillStyle = '#3a5a3a'; ctx.font = '24px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🏁', goal.x + goal.w/2, goal.y + goal.h/2 + 1);
  ctx.restore();

  // player (bigger)
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.10)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
  ctx.fillStyle = COLORS.player;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 8); ctx.fill();
  ctx.fillStyle = COLORS.playerDark;
  ctx.beginPath(); ctx.roundRect(px + 4, py - 5, pw - 8, 12, 5); ctx.fill();
  ctx.fillStyle = '#c8e8c8';
  ctx.beginPath(); ctx.arc(px + 9, py + 4, 3, 0, Math.PI * 2);
  ctx.arc(px + 21, py + 4, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath(); ctx.arc(px + 10, py + 4, 1.5, 0, Math.PI * 2);
  ctx.arc(px + 22, py + 4, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(px + pw/2, py + ph + 3, pw/2 + 3, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.restore(); // camera

  // win overlay
  if (gameWon) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const cw = canvas.width, ch = canvas.height;
    ctx.fillStyle = 'rgba(26,42,26,0.55)'; ctx.fillRect(0, 0, cw, ch);
    ctx.fillStyle = '#d4e8d4';
    ctx.font = `bold ${Math.min(42, cw/12)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 12;
    ctx.fillText('🎉 Уровень пройден!', cw/2, ch/2 - 10);
    ctx.shadowBlur = 0;
    ctx.font = `${Math.min(18, cw/22)}px sans-serif`;
    ctx.fillStyle = '#88b888';
    ctx.fillText('нажми «заново» чтобы начать снова', cw/2, ch/2 + 50);
    ctx.restore();
  }
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2; if (r > h/2) r = h/2;
    this.moveTo(x + r, y); this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

function loop() {
  update();
  resizeCanvas();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
