<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1a2a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: monospace;
    touch-action: none;
  }
  #game-container canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<div id="game-container"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ---- palette ----
const C = {
  sky:    0x8ab88a,
  skyT:   0xa8d4a8,
  hill:   0x6aaa6a,
  plat:   0x4a7a4a,
  platT:  0x6aaa6a,
  gnd:    0x3a5a3a,
  gndT:   0x5a8a5a,
  ply:    0x2a5a2a,
  plyH:   0x3a7a3a,
  plyE:   0xc8e8c8,
  plyP:   0x1a2a1a,
  coin:   0xc4d88c,
  coinG:  0xdce8b0,
  goal:   0x6aaa6a,
  goalI:  0x8ac88a,
  flagC:  0xc8e8c8,
  btnBg:  0x2a5a2a,
  btnBd:  0x4a8a4a,
  txt:    0xd4e8d4,
};

// ---- generate pixel textures via Canvas 2D ----
function makeTex(id, w, h, fn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  fn(c.getContext('2d'), w, h);
  return { id, data: c };
}

const textures2d = [
  makeTex('player', 12, 24, (ctx) => {
    const rows = [
      '...HHHH...', '..HHHHHH..', '.HHHHHHHH.', '.HPPPPPPH.',
      '.HPPPPPH..', '..HHHH....', '..HHHH....', '..HHHH....',
      '.HHHHHH...', '.H.HH.H...', '.H.HH.H...', '..H..H....',
      '..H..H....', '..HHHH....', '.HHHHHH...', '..H..H....',
      '..H..H....', '..H..H....', '..H..H....', '..H..H....',
      '..H..H....', '.HH..HH...', '.HH..HH...', '..H..H....',
    ];
    for (let y=0; y<24; y++) {
      for (let x=0; x<12; x++) {
        const ch = rows[y]?.[x];
        let col;
        if (ch==='H') col='#3a7a3a'; else if (ch==='P') col='#2a5a2a';
        else if (ch==='E') col='#c8e8c8'; else continue;
        ctx.fillStyle = col;
        ctx.fillRect(x, y, 1, 1);
      }
    }
    ctx.fillStyle = '#c8e8c8';
    ctx.fillRect(4, 8, 1, 1); ctx.fillRect(7, 8, 1, 1);
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(5, 8, 1, 1); ctx.fillRect(8, 8, 1, 1);
  }),
  makeTex('ground', 16, 16, (ctx) => {
    ctx.fillStyle = '#3a5a3a'; ctx.fillRect(0,0,16,16);
    ctx.fillStyle = '#5a8a5a'; ctx.fillRect(0,0,16,4);
    ctx.fillStyle = '#5a8a5a';
    ctx.fillRect(2,0,1,1); ctx.fillRect(6,0,1,1);
    ctx.fillRect(10,0,1,1); ctx.fillRect(14,1,1,1);
  }),
  makeTex('platform', 16, 16, (ctx) => {
    ctx.fillStyle = '#4a7a4a'; ctx.fillRect(0,0,16,16);
    ctx.fillStyle = '#6aaa6a'; ctx.fillRect(0,0,16,4);
    ctx.fillStyle = '#3a5a3a';
    ctx.fillRect(0,0,2,16); ctx.fillRect(14,0,2,16);
    ctx.fillRect(5,8,1,1); ctx.fillRect(11,10,1,1); ctx.fillRect(8,13,1,1);
  }),
  makeTex('coin', 8, 8, (ctx) => {
    ctx.fillStyle = '#c4d88c';
    ctx.fillRect(1,0,6,1); ctx.fillRect(0,1,8,6); ctx.fillRect(1,7,6,1);
    ctx.fillStyle = '#dce8b0'; ctx.fillRect(2,2,4,4);
    ctx.fillStyle = '#94a86c'; ctx.fillRect(4,3,2,3);
  }),
  makeTex('goal', 16, 24, (ctx) => {
    ctx.fillStyle = '#6aaa6a'; ctx.fillRect(6,0,4,24);
    ctx.fillStyle = '#c8e8c8'; ctx.fillRect(10,2,12,10);
    ctx.fillStyle = '#8ac88a'; ctx.fillRect(10,2,12,3);
  }),
];

// ---- Scene ----
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    // register textures
    for (const t of textures2d) {
      this.textures.addCanvas(t.id, t.data);
    }

    this.cameras.main.setBackgroundColor(C.sky);

    // background (simple gradient via graphics)
    const bg = this.add.graphics();
    for (let y=0; y<240; y++) {
      const t = y/240;
      const r = Math.floor(0xbe + (0x8a-0xbe)*t);
      const g = Math.floor(0xe8 + (0xc8-0xe8)*t);
      const b = Math.floor(0xbe + (0x8a-0xbe)*t);
      bg.fillStyle(Phaser.Display.Color.GetColor(r,g,b));
      bg.fillRect(0, y, 320, 1);
    }
    // hills
    bg.fillStyle(C.hill);
    function hill(cx, cy, rw, rh) {
      for (let y=0; y<rh; y++) {
        const w = Math.floor(rw * Math.sin(Math.PI*y/rh));
        bg.fillRect(cx-w, cy-rh+y, w*2, 1);
      }
    }
    hill(80, 228, 100, 60);
    hill(220, 232, 140, 55);
    hill(160, 234, 120, 50);
    bg.setDepth(0);

    // platforms
    const platGroup = this.physics.add.staticGroup();

    // ground
    const ground = this.add.tileSprite(0, 224, 320, 16, 'ground').setOrigin(0,0);
    platGroup.add(ground);

    const platData = [
      [24, 184, 112], [130, 142, 96], [204, 168, 96],
      [280, 116, 128], [256, 196, 64], [0, 200, 64],
    ];
    for (const [x,y,w] of platData) {
      const p = this.add.tileSprite(x, y, w, 16, 'platform').setOrigin(0,0);
      platGroup.add(p);
    }
    platGroup.refresh();

    // player
    this.player = this.physics.add.sprite(36, 196, 'player');
    this.player.setSize(10, 22);
    this.player.setOffset(1, 2);
    this.player.setBounce(0.1);
    this.player.setCollideWorldBounds(true);
    this.physics.add.collider(this.player, platGroup);

    // coins
    this.coins = this.physics.add.staticGroup();
    const coinPos = [[48,174],[90,174],[156,132],[188,132],[230,158],[258,158],[310,106],[314,106]];
    for (const [x,y] of coinPos) {
      const c = this.physics.add.staticSprite(x+4, y+4, 'coin');
      this.coins.add(c);
    }
    this.physics.add.overlap(this.player, this.coins, this.collectCoin, null, this);

    // goal
    this.goal = this.physics.add.staticSprite(300, 84, 'goal');
    this.physics.add.overlap(this.player, this.goal, this.win, null, this);

    // keyboard
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys(Phaser.Input.Keyboard.KeyCodes.W, Phaser.Input.Keyboard.KeyCodes.A, Phaser.Input.Keyboard.KeyCodes.S, Phaser.Input.Keyboard.KeyCodes.D);

    // touch state
    this.touchLeft = false;
    this.touchRight = false;
    this.touchJump = false;

    // ---- mobile buttons (simple graphics) ----
    const btnAlpha = 0.6;
    const btnLayer = this.add.graphics().setScrollFactor(0).setDepth(100);
    btnLayer.fillStyle(C.btnBg, btnAlpha);
    btnLayer.fillRoundedRect(18, 202, 36, 24, 4);
    btnLayer.fillRoundedRect(68, 202, 36, 24, 4);
    btnLayer.fillRoundedRect(250, 200, 60, 30, 4);
    btnLayer.lineStyle(1, C.btnBd, 1);
    btnLayer.strokeRoundedRect(18, 202, 36, 24, 4);
    btnLayer.strokeRoundedRect(68, 202, 36, 24, 4);
    btnLayer.strokeRoundedRect(250, 200, 60, 30, 4);

    // hit zones for buttons (invisible interactive rectangles)
    const hitL = this.add.zone(36, 214, 40, 28).setScrollFactor(0).setDepth(101).setInteractive();
    const hitR = this.add.zone(86, 214, 40, 28).setScrollFactor(0).setDepth(101).setInteractive();
    const hitJ = this.add.zone(280, 215, 64, 34).setScrollFactor(0).setDepth(101).setInteractive();

    hitL.on('pointerdown', () => this.touchLeft = true);
    hitL.on('pointerup', () => this.touchLeft = false);
    hitL.on('pointerout', () => this.touchLeft = false);
    hitR.on('pointerdown', () => this.touchRight = true);
    hitR.on('pointerup', () => this.touchRight = false);
    hitR.on('pointerout', () => this.touchRight = false);
    hitJ.on('pointerdown', () => this.touchJump = true);
    hitJ.on('pointerup', () => this.touchJump = false);
    hitJ.on('pointerout', () => this.touchJump = false);

    // labels
    const txtStyle = { font: '14px monospace', fill: '#d4e8d4' };
    this.add.text(36, 214, '<', txtStyle).setOrigin(0.5).setScrollFactor(0).setDepth(102);
    this.add.text(86, 214, '>', txtStyle).setOrigin(0.5).setScrollFactor(0).setDepth(102);
    this.add.text(280, 215, 'JUMP', { font: '11px monospace', fill: '#d4e8d4', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(102);

    // hide on non-touch
    if (!this.sys.game.device.input.touch) {
      btnLayer.setVisible(false);
      hitL.disableInteractive(); hitL.setVisible(false);
      hitR.disableInteractive(); hitR.setVisible(false);
      hitJ.disableInteractive(); hitJ.setVisible(false);
    }

    // jump key
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // HUD
    this.coinCount = 0;
    this.coinText = this.add.text(6, 6, '🍀 0', { font: '13px monospace', fill: '#d4e8d4' }).setScrollFactor(0).setDepth(99);
    this.statusText = this.add.text(160, 6, '', { font: '12px monospace', fill: '#d4e8d4' }).setOrigin(0.5,0).setScrollFactor(0).setDepth(99);
    this.gameWon = false;
  }

  collectCoin(_, coin) {
    coin.destroy();
    this.coinCount++;
    this.coinText.setText('🍀 ' + this.coinCount);
  }

  win() {
    if (this.gameWon) return;
    this.gameWon = true;
    this.statusText.setText('УРОВЕНЬ ПРОЙДЕН!');
    this.statusText.setStyle({ font: '14px monospace', fill: '#8ac88a', fontStyle: 'bold' });
    this.physics.pause();
  }

  update() {
    if (this.gameWon) return;

    const p = this.player;
    const spd = 110;
    const jump = -210;

    let mx = 0;
    if (this.cursors.left.isDown || this.wasd.A.isDown || this.touchLeft) mx = -1;
    else if (this.cursors.right.isDown || this.wasd.D.isDown || this.touchRight) mx = 1;

    p.setVelocityX(mx * spd);
    if (mx < 0) p.setFlipX(true);
    else if (mx > 0) p.setFlipX(false);

    if ((this.cursors.up.isDown || this.wasd.W.isDown || this.spaceKey.isDown || this.touchJump) && p.body.touching.down) {
      p.setVelocityY(jump);
    }

    this.statusText.setText('');
  }
}

const config = {
  type: Phaser.AUTO,
  width: 320,
  height: 240,
  parent: 'game-container',
  pixelArt: true,
  input: { activePointers: 3 },
  physics: { default: 'arcade', arcade: { gravity: { y: 480 }, debug: false } },
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: GameScene,
};

new Phaser.Game(config);
</script>
</body>
</html>
