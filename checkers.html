<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calm Checkers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #2d3a3a;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrapper {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px;
  }
  h1 {
    color: #d4e2e2; font-size: 20px; font-weight: 400; letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .board-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
    width: min(90vw, 500px);
    max-height: 70vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    background: #3e4f4f;
    padding: 6px;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    cursor: pointer;
  }
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    width: min(90vw, 500px);
    margin-top: 12px;
    color: #d4e2e2; font-size: 15px;
  }
  .hud span {
    background: #3e4f4f; padding: 6px 14px; border-radius: 8px;
  }
  #status { font-weight: 600; }
  #restartBtn {
    cursor: pointer; background: #3e4f4f; padding: 6px 14px; border-radius: 8px;
    transition: background 0.2s;
  }
  #restartBtn:hover { background: #4a5f5f; }
  .controls-hint {
    color: #8ba3a3; font-size: 13px; margin-top: 8px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <h1>шашки</h1>
  <div class="board-wrap">
    <canvas id="boardCanvas"></canvas>
  </div>
  <div class="hud">
    <span id="turnDisplay">ход: белые</span>
    <span id="status">игра</span>
    <span id="restartBtn">↻ заново</span>
  </div>
  <div class="controls-hint">кликни шашку → кликни клетку</div>
</div>
<script>
const canvas = document.getElementById('boardCanvas');
const ctx = canvas.getContext('2d');
const turnDisplay = document.getElementById('turnDisplay');
const statusEl = document.getElementById('status');
const restartBtn = document.getElementById('restartBtn');

const BOARD_SIZE = 8;
const CELL_SIZE = 1; // logical unit
const GRID = BOARD_SIZE;

let board = [];        // 0=empty, 1=white man, 2=black man, 3=white king, 4=black king
let selected = null;   // {r, c}
let validMoves = [];   // [{r, c}]
let turn = 'white';    // 'white' or 'black'
let gameOver = false;
let mustEat = false;
let eatingChain = null; // {r, c} when chain eating
let aiThinking = false;

const COLORS = {
  lightCell: '#b8c9c9',
  darkCell:  '#6b8f8f',
  lightCellHi: '#d0dddd',
  darkCellHi:  '#7a9e9e',
  whitePiece: '#e8e8e0',
  whiteDark:  '#c8c8c0',
  blackPiece: '#3e4f4f',
  blackDark:  '#2d3a3a',
  whiteKing:  '#e8d5b0',
  blackKing:  '#5b4f3a',
  validMove:  'rgba(168,201,168,0.5)',
  lastMove:   'rgba(168,201,168,0.25)',
};

// ---------- board init ----------
function initBoard() {
  board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if ((r + c) % 2 === 0) continue; // light cells, skip
      if (r < 3) board[r][c] = 2;      // black
      else if (r > 4) board[r][c] = 1; // white
    }
  }
  selected = null;
  validMoves = [];
  turn = 'white';
  gameOver = false;
  mustEat = false;
  eatingChain = null;
  aiThinking = false;
  updateHUD();
}

// ---------- helpers ----------
function isWhite(v) { return v === 1 || v === 3; }
function isBlack(v) { return v === 2 || v === 4; }
function isMan(v) { return v === 1 || v === 2; }
function isKing(v) { return v === 3 || v === 4; }
function owner(v) { return isWhite(v) ? 'white' : isBlack(v) ? 'black' : null; }

function inBounds(r, c) { return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE; }

// ---------- get all jumps for a piece ----------
function getJumps(r, c, piece, chain = false) {
  const jumps = [];
  const dirs = [];
  if (isMan(piece)) {
    const d = isWhite(piece) ? -1 : 1;
    dirs.push([d, -1], [d, 1]);
  } else {
    dirs.push([-1, -1], [-1, 1], [1, -1], [1, 1]);
  }
  for (const [dr, dc] of dirs) {
    const mr = r + dr, mc = c + dc;
    const lr = r + 2*dr, lc = c + 2*dc;
    if (!inBounds(lr, lc)) continue;
    const mid = board[mr][mc];
    if (mid === 0) continue;
    if (owner(mid) === owner(piece)) continue;
    if (board[lr][lc] !== 0) continue;
    // if we are in a chain, can't eat the same piece twice? simple: allow all
    jumps.push({ r: lr, c: lc, eatR: mr, eatC: mc });
  }
  return jumps;
}

// ---------- get all simple moves ----------
function getSimpleMoves(r, c, piece) {
  const moves = [];
  const dirs = [];
  if (isMan(piece)) {
    const d = isWhite(piece) ? -1 : 1;
    dirs.push([d, -1], [d, 1]);
  } else {
    dirs.push([-1, -1], [-1, 1], [1, -1], [1, 1]);
  }
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (!inBounds(nr, nc)) continue;
    if (board[nr][nc] !== 0) continue;
    moves.push({ r: nr, c: nc });
  }
  return moves;
}

// ---------- get all moves (including chains) for a color ----------
function getAllMoves(color, onlyEat = false) {
  const result = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = board[r][c];
      if (p === 0 || owner(p) !== color) continue;
      const jumps = getJumps(r, c, p);
      for (const j of jumps) {
        // chain: check if after jump we can eat more
        // for simulation we store the starting piece
        result.push({ sr: r, sc: c, dr: j.r, dc: j.c, eatR: j.eatR, eatC: j.eatC, isJump: true, piece: p });
      }
      if (!onlyEat) {
        const moves = getSimpleMoves(r, c, p);
        for (const m of moves) {
          result.push({ sr: r, sc: c, dr: m.r, dc: m.c, isJump: false, piece: p });
        }
      }
    }
  }
  return result;
}

// ---------- apply a move on a board copy ----------
function applyMove(boardCopy, move, checkKing = true) {
  const b = boardCopy.map(row => [...row]);
  const piece = b[move.sr][move.sc];
  b[move.sr][move.sc] = 0;
  b[move.dr][move.dc] = piece;
  if (move.isJump && move.eatR !== undefined) {
    b[move.eatR][move.eatC] = 0;
  }
  // king promotion
  if (checkKing) {
    if (piece === 1 && move.dr === 0) b[move.dr][move.dc] = 3;
    if (piece === 2 && move.dr === 7) b[move.dr][move.dc] = 4;
  }
  return b;
}

// ---------- check if a color has any moves ----------
function hasMoves(color) {
  const all = getAllMoves(color, false);
  // must eat if any jump available
  const jumps = all.filter(m => m.isJump);
  if (jumps.length > 0) return true; // there are forced captures
  const simple = all.filter(m => !m.isJump);
  return simple.length > 0;
}

// ---------- get forced moves for a specific piece ----------
function getForcedMovesForPiece(r, c) {
  const p = board[r][c];
  if (p === 0) return [];
  const jumps = getJumps(r, c, p);
  if (jumps.length > 0) return jumps.map(j => ({ ...j, sr: r, sc: c, isJump: true, piece: p }));
  return [];
}

// ---------- check if any piece must eat ----------
function anyMustEat(color) {
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = board[r][c];
      if (p === 0 || owner(p) !== color) continue;
      const jumps = getJumps(r, c, p);
      if (jumps.length > 0) return true;
    }
  }
  return false;
}

// ---------- count pieces ----------
function countPieces(color) {
  let n = 0;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = board[r][c];
      if (p !== 0 && owner(p) === color) n++;
    }
  }
  return n;
}

// ========== AI ==========
function evaluateBoard(b) {
  let score = 0;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = b[r][c];
      if (p === 0) continue;
      const val = isKing(p) ? 3 : 1;
      // positional bonus: center & forward for men
      let pos = 0;
      if (isMan(p)) {
        // encourage forward
        const forward = isWhite(p) ? (7 - r) : r;
        pos = forward * 0.1;
        // center
        const centerDist = Math.abs(c - 3.5);
        pos += (2 - centerDist * 0.3);
      } else {
        // kings like center
        const cd = Math.abs(c - 3.5) + Math.abs(r - 3.5);
        pos = (4 - cd) * 0.2;
      }
      const sign = isWhite(p) ? 1 : -1;
      score += sign * (val * 10 + pos);
    }
  }
  // mobility bonus (crude)
  return score;
}

function minimax(b, depth, isMax, alpha, beta) {
  if (depth === 0) {
    return { score: evaluateBoard(b), move: null };
  }
  const color = isMax ? 'white' : 'black';
  const moves = getAllMovesForBoard(b, color);
  if (moves.length === 0) {
    // no moves = loss
    return { score: isMax ? -9999 + (3-depth) : 9999 - (3-depth), move: null };
  }
  let bestMove = moves[0];
  if (isMax) {
    let maxEval = -Infinity;
    for (const m of moves) {
      const nb = applyMove(b, m);
      const ev = minimax(nb, depth - 1, false, alpha, beta);
      if (ev.score > maxEval) {
        maxEval = ev.score;
        bestMove = m;
      }
      alpha = Math.max(alpha, maxEval);
      if (beta <= alpha) break;
    }
    return { score: maxEval, move: bestMove };
  } else {
    let minEval = Infinity;
    for (const m of moves) {
      const nb = applyMove(b, m);
      const ev = minimax(nb, depth - 1, true, alpha, beta);
      if (ev.score < minEval) {
        minEval = ev.score;
        bestMove = m;
      }
      beta = Math.min(beta, minEval);
      if (beta <= alpha) break;
    }
    return { score: minEval, move: bestMove };
  }
}

function getAllMovesForBoard(b, color) {
  const moves = [];
  const onlyEat = false;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = b[r][c];
      if (p === 0 || owner(p) !== color) continue;
      const jumps = getJumpsForBoard(b, r, c, p);
      for (const j of jumps) {
        moves.push({ sr: r, sc: c, dr: j.r, dc: j.c, eatR: j.eatR, eatC: j.eatC, isJump: true, piece: p });
      }
      if (!onlyEat) {
        const sm = getSimpleMovesForBoard(b, r, c, p);
        for (const m of sm) {
          moves.push({ sr: r, sc: c, dr: m.r, dc: m.c, isJump: false, piece: p });
        }
      }
    }
  }
  // filter: if any jump exists, only jumps
  const jumps = moves.filter(m => m.isJump);
  if (jumps.length > 0) return jumps;
  return moves;
}

function getJumpsForBoard(b, r, c, piece) {
  const jumps = [];
  const dirs = isKing(piece) ? [[-1,-1],[-1,1],[1,-1],[1,1]] : isWhite(piece) ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
  for (const [dr, dc] of dirs) {
    const mr = r+dr, mc = c+dc;
    const lr = r+2*dr, lc = c+2*dc;
    if (!inBounds(lr,lc)) continue;
    const mid = b[mr][mc];
    if (mid === 0 || owner(mid) === owner(piece) || b[lr][lc] !== 0) continue;
    jumps.push({ r: lr, c: lc, eatR: mr, eatC: mc });
  }
  return jumps;
}

function getSimpleMovesForBoard(b, r, c, piece) {
  const moves = [];
  const dirs = isKing(piece) ? [[-1,-1],[-1,1],[1,-1],[1,1]] : isWhite(piece) ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
  for (const [dr, dc] of dirs) {
    const nr = r+dr, nc = c+dc;
    if (!inBounds(nr,nc) || b[nr][nc] !== 0) continue;
    moves.push({ r: nr, c: nc });
  }
  return moves;
}

// ---------- make AI move ----------
function aiMove() {
  aiThinking = true;
  statusEl.textContent = 'думаю...';
  setTimeout(() => {
    const result = minimax(board, 3, false, -Infinity, Infinity);
    if (!result.move) {
      gameOver = true;
      statusEl.textContent = '🏆 вы выиграли!';
      aiThinking = false;
      drawBoard();
      return;
    }
    const m = result.move;
    const piece = board[m.sr][m.sc];
    board[m.sr][m.sc] = 0;
    board[m.dr][m.dc] = piece;
    if (m.isJump) board[m.eatR][m.eatC] = 0;
    // promote
    if (piece === 2 && m.dr === 7) board[m.dr][m.dc] = 4;
    if (piece === 1 && m.dr === 0) board[m.dr][m.dc] = 3;

    // chain for AI (if multiple jumps available, take them)
    let chainPos = { r: m.dr, c: m.dc };
    if (m.isJump) {
      let chainPiece = board[chainPos.r][chainPos.c];
      let chainJumps = getJumps(chainPos.r, chainPos.c, chainPiece);
      while (chainJumps.length > 0) {
        const cj = chainJumps[0];
        board[chainPos.r][chainPos.c] = 0;
        board[cj.r][cj.c] = chainPiece;
        board[cj.eatR][cj.eatC] = 0;
        chainPos = { r: cj.r, c: cj.c };
        if (chainPiece === 2 && cj.r === 7) board[cj.r][cj.c] = 4;
        chainJumps = getJumps(cj.r, cj.c, board[cj.r][cj.c]);
      }
    }

    turn = 'white';
    aiThinking = false;
    checkGameState();
    drawBoard();
    updateHUD();
  }, 100);
}

// ---------- game state check ----------
function checkGameState() {
  const wCount = countPieces('white');
  const bCount = countPieces('black');
  if (bCount === 0) { gameOver = true; statusEl.textContent = '🏆 вы выиграли!'; return true; }
  if (wCount === 0) { gameOver = true; statusEl.textContent = '🤖 компьютер выиграл!'; return true; }
  if (!hasMoves('black')) { gameOver = true; statusEl.textContent = '🏆 вы выиграли!'; return true; }
  if (!hasMoves('white')) { gameOver = true; statusEl.textContent = '🤖 компьютер выиграл!'; return true; }
  return false;
}

// ---------- handle click ----------
function handleClick(e) {
  if (gameOver || aiThinking || turn !== 'white') return;

  const rect = canvas.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  const scale = size / (BOARD_SIZE);
  const mx = (e.clientX - rect.left) / size * BOARD_SIZE;
  const my = (e.clientY - rect.top) / size * BOARD_SIZE;
  const c = Math.floor(mx);
  const r = Math.floor(my);
  if (!inBounds(r, c)) return;

  // if we have selected piece and clicked a valid move
  if (selected) {
    const move = validMoves.find(m => m.dr === r && m.dc === c);
    if (move) {
      // execute move
      const piece = board[selected.r][selected.c];
      board[selected.r][selected.c] = 0;
      board[r][c] = piece;
      if (move.isJump && move.eatR !== undefined) {
        board[move.eatR][move.eatC] = 0;
      }
      // promote
      if (piece === 1 && r === 0) board[r][c] = 3;
      if (piece === 2 && r === 7) board[r][c] = 4;

      // chain check
      if (move.isJump) {
        const chainJumps = getJumps(r, c, board[r][c]);
        if (chainJumps.length > 0) {
          // continue eating
          selected = { r, c };
          validMoves = chainJumps.map(j => ({ ...j, sr: r, sc: c, isJump: true, piece: board[r][c] }));
          drawBoard();
          return;
        }
      }

      selected = null;
      validMoves = [];
      turn = 'black';
      if (checkGameState()) { drawBoard(); updateHUD(); return; }
      drawBoard();
      updateHUD();
      aiMove();
      return;
    }
  }

  // select piece
  const p = board[r][c];
  if (p === 0 || owner(p) !== 'white') return;

  // check forced eating
  const mustEatWhite = anyMustEat('white');
  const jumps = getForcedMovesForPiece(r, c);
  if (mustEatWhite && jumps.length === 0) return; // must eat with other piece

  selected = { r, c };
  const allMoves = getAllMovesForBoard(board, 'white');
  validMoves = allMoves.filter(m => m.sr === r && m.sc === c);

  // if must eat, filter to jumps only
  if (mustEatWhite) {
    validMoves = validMoves.filter(m => m.isJump);
  }

  drawBoard();
}

// ---------- draw ----------
function drawBoard() {
  const size = canvas.width;
  ctx.clearRect(0, 0, size, size);

  const cell = size / BOARD_SIZE;
  const pad = cell * 0.12;
  const pieceR = (cell - pad * 2) / 2;

  // cells
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const isLight = (r + c) % 2 === 0;
      ctx.fillStyle = isLight ? COLORS.lightCell : COLORS.darkCell;
      ctx.fillRect(c * cell, r * cell, cell, cell);
    }
  }

  // valid moves
  for (const m of validMoves) {
    ctx.fillStyle = COLORS.validMove;
    ctx.beginPath();
    ctx.arc(m.dc * cell + cell/2, m.dr * cell + cell/2, cell * 0.18, 0, Math.PI * 2);
    ctx.fill();
    if (m.isJump && m.eatR !== undefined) {
      ctx.fillStyle = 'rgba(200,100,100,0.3)';
      ctx.fillRect(m.eatC * cell, m.eatR * cell, cell, cell);
    }
  }

  // selected highlight
  if (selected) {
    ctx.fillStyle = 'rgba(168,201,168,0.25)';
    ctx.fillRect(selected.c * cell, selected.r * cell, cell, cell);
  }

  // pieces
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      const p = board[r][c];
      if (p === 0) continue;
      const cx = c * cell + cell/2;
      const cy = r * cell + cell/2;
      const isW = isWhite(p);
      const isK = isKing(p);

      ctx.save();
      // shadow
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = cell * 0.08;

      // piece body
      const grad = ctx.createRadialGradient(cx - pieceR*0.3, cy - pieceR*0.3, 0, cx, cy, pieceR);
      if (isW) {
        grad.addColorStop(0, '#f5f5ef');
        grad.addColorStop(1, COLORS.whiteDark);
      } else {
        grad.addColorStop(0, '#5a6b6b');
        grad.addColorStop(1, COLORS.blackDark);
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, pieceR, 0, Math.PI * 2);
      ctx.fill();

      // border
      ctx.shadowBlur = 0;
      ctx.strokeStyle = isW ? '#b0b0a8' : '#1d2a2a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, pieceR, 0, Math.PI * 2);
      ctx.stroke();

      // king crown
      if (isK) {
        ctx.fillStyle = isW ? COLORS.whiteKing : COLORS.blackKing;
        ctx.font = `${cell * 0.4}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♛', cx, cy + 1);
      }

      ctx.restore();
    }
  }
}

// ---------- HUD ----------
function updateHUD() {
  turnDisplay.textContent = `ход: ${turn === 'white' ? 'белые' : 'чёрные'}`;
  if (!gameOver) statusEl.textContent = 'игра';
}

// ---------- resize ----------
function resizeBoard() {
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(rect.width, rect.height);
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);
  drawBoard();
}

// ---------- init ----------
initBoard();

canvas.addEventListener('click', handleClick);
window.addEventListener('resize', resizeBoard);
resizeBoard();

restartBtn.addEventListener('click', () => {
  initBoard();
  drawBoard();
});
</script>
</body>
</html>
